{{- if .Values.dailyScan.enabled }}
{{- $scanPayload := dict "save" true }}
{{- if .Values.dailyScan.tickers }}
{{- $_ := set $scanPayload "tickers" .Values.dailyScan.tickers }}
{{- end }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-daily-scan
spec:
  schedule: {{ .Values.dailyScan.schedule | quote }}
  {{- with .Values.dailyScan.timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  startingDeadlineSeconds: {{ .Values.dailyScan.startingDeadlineSeconds }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: daily-scan
              image: curlimages/curl:8.10.1
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-ec"]
              args:
                - |
                  curl --fail --show-error --silent \
                    -H 'content-type: application/json' \
                    -X POST \
                    --data '{{ $scanPayload | toJson }}' \
                    http://{{ .Release.Name }}:{{ .Values.service.port }}/api/daily-scan
{{- end }}
