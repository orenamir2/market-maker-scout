replicaCount: 1
image:
  repository: ghcr.io/OWNER/market-maker-scout
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
  className: nginx
  host: scout.local
resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: 500m, memory: 512Mi}
env:
  DATA_MODE: live
  SCAN_HISTORY_DIR: /data/scan-history
persistence:
  enabled: false
  size: 1Gi
  storageClassName: ""
dailyScan:
  enabled: false
  schedule: "0 21 * * 1-5"
  tickers: []
