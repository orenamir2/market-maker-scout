replicaCount: 1
image:
  repository: ghcr.io/OWNER/market-maker-scout
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
  className: nginx
  host: scout.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "900"
resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: 500m, memory: 512Mi}
env:
  DATA_MODE: live
  SCAN_HISTORY_DIR: /data/scan-history
  SCAN_WORKERS: "24"
  MARKET_DATA_TIMEOUT_SECONDS: "6"
  INDUSTRY_TIMEOUT_SECONDS: "3"
  DEFAULT_UNIVERSE_TIMEOUT_SECONDS: "20"
  SCAN_TIMEZONE: Asia/Jerusalem
persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
dailyScan:
  enabled: false
  schedule: "0 * * * *"
  timeZone: Asia/Jerusalem
  startingDeadlineSeconds: 86400
  tickers: []
