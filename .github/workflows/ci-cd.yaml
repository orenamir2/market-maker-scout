name: ci-cd
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build-publish:
    runs-on: ubuntu-latest
    outputs:
      image-repository: ${{ steps.meta.outputs.image_repository }}
      image-tag: ${{ steps.meta.outputs.version }}
      chart-version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt && pytest -q

      - name: Compute package version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(awk -F': *' '$1 == "version" {print $2; exit}' helm/market-maker-scout/Chart.yaml | tr -d '"')"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${base_version}-main.${GITHUB_RUN_NUMBER}"
          fi
          image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_repository=$image_repository" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REPOSITORY=$image_repository" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$version" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/market-maker-scout

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package helm/market-maker-scout \
            --version "$IMAGE_TAG" \
            --app-version "$IMAGE_TAG" \
            --destination dist

      - name: Push Helm chart to GHCR
        if: github.event_name != 'pull_request'
        run: helm push "dist/market-maker-scout-$IMAGE_TAG.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/charts"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-publish
    runs-on: [self-hosted, macOS]
    env:
      NAMESPACE: market-maker-scout
      IMAGE_PULL_SECRET: ghcr-pull-secret
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.14'}
      - uses: actions/setup-node@v4
        with: {node-version: '22'}
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Install Codex CLI
        run: command -v codex >/dev/null || npm install -g @openai/codex || true
      - name: Configure kubeconfig
        if: ${{ env.KUBE_CONFIG_B64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/kube"
          echo "$KUBE_CONFIG_B64" | base64 --decode > "$RUNNER_TEMP/kube/config"
          chmod 600 "$RUNNER_TEMP/kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
      - name: Verify local cluster access
        run: kubectl cluster-info
      - name: Configure GHCR image pull secret
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN || github.token }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry "$IMAGE_PULL_SECRET" \
            --namespace "$NAMESPACE" \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy and advise on failure
        env:
          IMAGE_REPOSITORY: ${{ needs.build-publish.outputs.image-repository }}
          IMAGE_TAG: ${{ needs.build-publish.outputs.image-tag }}
          IMAGE_PULL_SECRET: ${{ env.IMAGE_PULL_SECRET }}
          NAMESPACE: ${{ env.NAMESPACE }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./scripts/deploy.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: deployment-advice
          path: deployment-advice.txt
          if-no-files-found: ignore
