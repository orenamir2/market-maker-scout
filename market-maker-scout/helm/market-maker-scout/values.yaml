replicaCount: 1
image:
  repository: ghcr.io/OWNER/market-maker-scout
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
  className: nginx
  host: scout.local
resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: 500m, memory: 512Mi}
env:
  DATA_MODE: demo
