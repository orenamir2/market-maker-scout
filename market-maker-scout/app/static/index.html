<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Market Maker Scout</title><style>body{font-family:system-ui;max-width:1100px;margin:40px auto;padding:0 16px}textarea{width:100%;height:140px}button{padding:10px 18px;margin:12px 0}table{border-collapse:collapse;width:100%}th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}.warn{background:#fff4cc;padding:12px}</style></head><body><h1>Market Maker Scout</h1><p class="warn">Experimental statistical ranking only—not proof of market-maker buying and not financial advice.</p><textarea id="tickers">AAPL,MSFT,NVDA,AMD,PLTR,SOFI,SHOP,TEAM,PD,BBW</textarea><br><button onclick="scan()">Scan</button><div id="status"></div><table><thead><tr><th>Ticker</th><th>Score</th><th>Confidence</th><th>Volume Z</th><th>20d move</th><th>Explanation</th></tr></thead><tbody id="rows"></tbody></table><script>async function scan(){const tickers=document.getElementById('tickers').value.split(/[\s,]+/).filter(Boolean);document.getElementById('status').textContent='Scanning...';const r=await fetch('/api/scan',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({tickers})});const d=await r.json();document.getElementById('status').textContent=d.warning||d.detail||'';document.getElementById('rows').innerHTML=(d.results||[]).map(x=>`<tr><td>${x.ticker}</td><td>${x.score}</td><td>${x.confidence}%</td><td>${x.volume_z}</td><td>${x.relative_strength}%</td><td>${x.explanation}</td></tr>`).join('')}</script></body></html>
