<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Market Maker Scout</title>
  <style>
    body{font-family:system-ui;max-width:1100px;margin:40px auto;padding:0 16px}
    textarea{width:100%;height:180px}
    button{padding:10px 18px;margin:12px 0}
    table{border-collapse:collapse;width:100%}
    th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
    .warn{background:#fff4cc;padding:12px}
  </style>
</head>
<body>
  <h1>Market Maker Scout</h1>
  <p class="warn">Experimental statistical ranking only - not proof of market-maker buying and not financial advice.</p>
  <textarea id="tickers">CPF,GDRX,FAC,LUCK,CCNE,EEX,FUBO,PLOW,SG,GSBD,BVS,PSUS,SCHL,GRPN,EQBK,GO,LXRX,BFST,MBWM,NNE,AMTB,ARRY,TROX,PHAR,WSR,KFRC,ABR,HSLV,KDK,INMD,ODD,COUR,BCX,MFA,QNST,GERN,DAKT,NAK,ASA,HAFC,TK,RDVT,TRST,AVR,ANNX,DSGN,ABUS,LBRX,GOOS,NBBK,ESRT,CSR,FTH,ANRO,BLDP,BKSY,GLAS,WRLD,CRCT,EIG,FTK,REPL,BBSI,BUR,KOP,KBDC,NXDR,CAC,AEBI,GILT,ARKO,LMB,GLIBA,FBRX,UMAC,IVA,TBN,BBDC,PMT,HIVE,GLIBK,THFF,NPK,ACDC,LYTS,BFS,HPK,RJET,EVER,MPB,TALK,RPC,MITK,TBPH,BZH,HMH,DSP,ADSE,GTM,MOV,BH,TDUP,HRTG,CCBG,DGICB,FMNB,GSBC,ALOY,EVEX,MTAL,AHG,GMRS,BCSF,SMP,MAX,MATW,KELYB,WGO,WOOF,ADAM,TRNS,AMPH,HPP,HTB,HSTM,CCU,SMBC,METC,ESPR,MNTN,PGC,CTMX,EGBN,HCMA,CYRX,MFIC,SPFI,APOG,OPFI,KODK,CLYM,ODTX,INR,NX,NABL,PD,PSIX,SMBK,DJCO,MTUS,ORRF,OCS,ZVRA,SPRY,RIGL,ALRS,LXU,SDHC,MAMA,ACRS,SIBN,IMMX,NAVI,VTEX,OFRM,HNRG,FWRG,FDUS,FISI,DRUG,OIO,RSKD,BBNX,SSII,NGVC,NGNE,SHBI,FPH,ONT,HZO,CODI,SKYH,GDOT,SGP,HIPO,NEWP,RPD,HOV,ANGX,OMER,ODV,AGNT,AIAI,CBLL,IBCP,CGBD,LPTH,IVR,SSYS,HYLN,IRWD,KRNT,SABR,GYRE,WEST,CARE,SWIM,EFOR,RGNX,CSTL,CTO,REPX,IBTA,SOC,HSHP,MNPR,BLMN,KOPN,FOXF,PFLT,JBI,SLRC,AURA,SB,PRAA,SHEN,PKE,VBNK,INN,DGICA,GFR,BMM,SWBI,SXC,PAR,NXRT,CADL,MEC,ALLO,CCSI,TIPT,TMS,WASH,PRME,KRT,BWMX,VEL,KRO,MAKO,WHK</textarea>
  <br>
  <button onclick="scan()">Scan</button>
  <div id="status"></div>
  <table>
    <thead>
      <tr><th>Ticker</th><th>Score</th><th>Confidence</th><th>Volume Z</th><th>20d move</th><th>Explanation</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <script>
    async function scan() {
      const tickers = document.getElementById('tickers').value.split(/[\s,]+/).filter(Boolean);
      document.getElementById('status').textContent = 'Scanning...';
      const r = await fetch('/api/scan', {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({tickers})
      });
      const d = await r.json();
      document.getElementById('status').textContent = d.warning || d.detail || '';
      document.getElementById('rows').innerHTML = (d.results || []).map(x =>
        `<tr><td>${x.ticker}</td><td>${x.score}</td><td>${x.confidence}%</td><td>${x.volume_z}</td><td>${x.relative_strength}%</td><td>${x.explanation}</td></tr>`
      ).join('');
    }
  </script>
</body>
</html>
